<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeProj01 Frontend</title>
    <style>
      body {
        margin: 0;
        background: #111827;
        color: #e5e7eb;
        font-family: Inter, Roboto, system-ui, sans-serif;
      }
      .page {
        max-width: 760px;
        margin: 0 auto;
        padding: 2rem 1.25rem;
      }
      .card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(148,163,184,0.18);
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 16px 40px rgba(15,23,42,0.2);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2rem, 3vw, 2.6rem);
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 0.9rem 1.3rem;
        font-size: 1rem;
        cursor: pointer;
        color: #111827;
        background: #f59e0b;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(245,158,11,0.3); }
      label, select, input { display: block; margin-top: 0.75rem; }
      select, input { width: 100%; max-width: 240px; border-radius: 10px; border: 1px solid rgba(148,163,184,0.35); padding: 0.75rem; background: rgba(255,255,255,0.06); color: #e5e7eb; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0.75rem 0 0;
      }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .small { opacity: 0.8; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <div id="app">Loading...</div>
    <script type="module" src="/main.js"></script>
  
  </body>
</html>
